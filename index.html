<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>AsTi – Asiointitietokone</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      margin: 0;
      text-align: center;
    }

    .logo {
      position: fixed;
      top: 10px;
      left: 10px;
      height: 60px;
    }

    h1 {
      margin-top: 40px;
      font-size: 32px;
    }

    h2 {
      margin-top: 10px;
      font-weight: normal;
      color: #555;
    }

    .info {
      margin: 20px auto;
      font-size: 18px;
      color: #333;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 25px;
      max-width: 900px;
      margin: 40px auto;
    }

    .button {
      display: block;
      padding: 25px;
      font-size: 20px;
      background-color: #2d6cdf;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      transition: 0.2s;
    }

    .button:hover {
      background-color: #1b4fa8;
    }

    .footer {
      margin-top: 40px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>

<body>

<img src="diki-logo.png" class="logo">

<h1>AsTi – Asiointitietokone</h1>
<h2>Peruspalvelut</h2>

<div class="info">
Valitse palvelu. Tarvittaessa pyydä apua.
</div>

<div class="grid">

  <a href="https://www.suomi.fi" class="button">Suomi.fi</a>

  <a href="https://www.kanta.fi/omakanta" class="button">Omakanta</a>

  <a href="https://www.vero.fi/omavero" class="button">OmaVero</a>

  <a href="https://www.op.fi" class="button">Pankki (OP)</a>

  <a href="https://mail.google.com" class="button">Sähköposti</a>

  <a href="https://www.omasavo.fi" class="button">OmaSavo</a>

</div>

<div class="footer">
DiKi – Digilaitteiden kierrätyksellä digi-in
</div>

</body>
</html>
