<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AsTi – Asiointitietokone</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f3f4f6;
      margin: 0;
      color: #222;
      text-align: center;
    }

    /* YLÄOSA TIIVISTETTY */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 15px 20px 5px 20px;
    }

    .logo {
      width: 180px;
      border-radius: 14px;
    }

    .brand-text h2 {
      margin: 0;
      font-size: 30px;
    }

    .brand-text p {
      margin: 2px 0 0 0;
      font-size: 20px;
      color: #555;
    }

    h1 {
      margin: 5px 0 0 0;
      font-size: 42px;
    }

    h2.subtitle {
      margin: 5px 0 10px 0;
      font-size: 28px;
      color: #555;
      font-weight: normal;
    }

    .info {
      font-size: 20px;
      margin-bottom: 20px;
    }

    /* GRID KOMPAKTIMPI */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 30px;
    }

    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100px;
      background-color: #3b71d8;
      color: white;
      text-decoration: none;
      font-size: 26px;
      border-radius: 18px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.10);
    }

    /* YHTEYSLAATIKKO PIENEMPI */
    .help-box {
      position: fixed;
      right: 15px;
      bottom: 15px;
      background: #f7f7f7;
      border: 3px solid #3b71d8;
      border-radius: 18px;
      padding: 12px 16px;
      text-align: left;
      max-width: 240px;
    }

    .help-box h3 {
      margin: 0 0 5px 0;
      font-size: 18px;
    }

    .help-box p {
      margin: 0;
      font-size: 16px;
    }

    .footer {
      margin: 10px 0 15px 0;
      font-size: 14px;
      color: #777;
    }

  </style>
</head>

<body>

  <div class="topbar">
    <img src="diki-logo.png" class="logo">
    <div class="brand-text">
      <h2>Digiin kiinni</h2>
      <p>Digilaitteiden kierrätyksellä</p>
    </div>
  </div>

  <h1>AsTi – Asiointitietokone</h1>
  <h2 class="subtitle">Peruspalvelut</h2>

  <div class="info">
    Valitse palvelu. Tarvittaessa pyydä apua.
  </div>

  <div class="grid">
    <a href="https://www.suomi.fi" class="button">Suomi.fi</a>
    <a href="https://www.kanta.fi/omakanta" class="button">Omakanta</a>
    <a href="https://www.vero.fi/omavero" class="button">OmaVero</a>
    <a href="https://www.op.fi" class="button">Pankki (OP)</a>
    <a href="https://mail.google.com" class="button">Sähköposti</a>
    <a href="https://www.omasavo.fi" class="button">OmaSavo</a>
  </div>

  <div class="help-box">
    <h3>Tarvitsetko apua?</h3>
    <p>DiKi ry<br>tuki.diki2026@gmail.com</p>
  </div>

  <div class="footer">
    DiKi – Digilaitteiden kierrätyksellä digi-in
  </div>

</body>
</html>
