<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AsTi – Asiointitietokone</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f3f4f6;
      margin: 0;
      color: #222;
      text-align: center;
    }

    .page {
      max-width: 1360px;
      margin: 0 auto;
      padding: 10px 20px 20px 20px;
      box-sizing: border-box;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 6px;
    }

    .logo {
      width: 180px;
      height: auto;
      border-radius: 16px;
      display: block;
    }

    .brand-text {
      text-align: left;
    }

    .brand-text h2 {
      margin: 0;
      font-size: 30px;
      line-height: 1.05;
      font-weight: 700;
    }

    .brand-text p {
      margin: 4px 0 0 0;
      font-size: 20px;
      line-height: 1.15;
      color: #555;
    }

    h1 {
      margin: 8px 0 0 0;
      font-size: 52px;
      line-height: 1.05;
      font-weight: 700;
    }

    .subtitle {
      margin: 4px 0 14px 0;
      font-size: 30px;
      line-height: 1.1;
      font-weight: 400;
      color: #666;
    }

    .info {
      margin: 0 0 20px 0;
      font-size: 20px;
      color: #333;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin: 0 auto;
      max-width: 1180px;
    }

    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 92px;
      padding: 10px 16px;
      background-color: #3b71d8;
      color: #fff;
      text-decoration: none;
      font-size: 24px;
      border-radius: 18px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.10);
      box-sizing: border-box;
    }

    .button:hover {
      background-color: #2d62c7;
    }

    .footer {
      margin-top: 14px;
      font-size: 14px;
      color: #777;
    }

    .help-box {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: #f7f7f7;
      border: 3px solid #3b71d8;
      border-radius: 18px;
      padding: 14px 18px;
      text-align: left;
      box-shadow: 0 5px 12px rgba(0,0,0,0.10);
      max-width: 250px;
      box-sizing: border-box;
    }

    .help-box h3 {
      margin: 0 0 6px 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .help-box p {
      margin: 0;
      font-size: 16px;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="topbar">
      <img src="diki-logo.png" alt="DiKi-logo" class="logo">

      <div class="brand-text">
        <h2>Digiin kiinni</h2>
        <p>Digilaitteiden kierrätyksellä</p>
      </div>
    </div>

    <h1>AsTi – Asiointitietokone</h1>
    <div class="subtitle">Peruspalvelut</div>

    <div class="info">
      Valitse palvelu. Tarvittaessa pyydä apua.
    </div>

    <div class="grid">
      <a href="https://www.suomi.fi" class="button">Suomi.fi</a>
      <a href="https://www.kanta.fi/omakanta" class="button">Omakanta</a>
      <a href="https://www.vero.fi/omavero" class="button">OmaVero</a>
      <a href="https://www.op.fi" class="button">Pankki (OP)</a>
      <a href="https://mail.google.com" class="button">Sähköposti</a>
      <a href="https://www.omasavo.fi" class="button">OmaSavo</a>
    </div>

    <div class="footer">
      DiKi – Digilaitteiden kierrätyksellä digi-in
    </div>

  </div>

  <div class="help-box">
    <h3>Tarvitsetko apua?</h3>
    <p>DiKi ry:n tukipalvelu<br>tuki.diki2026@gmail.com</p>
  </div>
</body>
</html>
