<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AsTi – Asiointitietokone</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f3f4f6;
      margin: 0;
      color: #222;
      text-align: center;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 28px;
      padding: 24px 40px 10px 40px;
      max-width: 1400px;
      margin: 0 auto;
      text-align: left;
    }

    .logo {
      width: 260px;
      max-width: 32vw;
      height: auto;
      border-radius: 18px;
      object-fit: contain;
    }

    .brand-text h2 {
      margin: 0;
      font-size: 42px;
      font-weight: 700;
      line-height: 1.1;
    }

    .brand-text p {
      margin: 6px 0 0 0;
      font-size: 28px;
      color: #555;
      line-height: 1.2;
    }

    h1 {
      margin: 10px 0 0 0;
      font-size: 66px;
      font-weight: 700;
    }

    h2.subtitle {
      margin: 8px 0 24px 0;
      font-size: 40px;
      font-weight: 400;
      color: #555;
    }

    .info {
      font-size: 26px;
      margin-bottom: 40px;
      color: #333;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 34px;
      max-width: 1500px;
      margin: 0 auto 70px auto;
      padding: 0 60px;
      box-sizing: border-box;
    }

    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 130px;
      padding: 20px;
      background-color: #3b71d8;
      color: white;
      text-decoration: none;
      font-size: 34px;
      border-radius: 22px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.10);
      transition: background-color 0.2s ease;
    }

    .button:hover {
      background-color: #2c5fbe;
    }

    .help-box {
      position: fixed;
      right: 28px;
      bottom: 24px;
      background: #f7f7f7;
      border: 4px solid #3b71d8;
      border-radius: 24px;
      padding: 20px 26px;
      text-align: left;
      box-shadow: 0 6px 14px rgba(0,0,0,0.10);
      max-width: 320px;
    }

    .help-box h3 {
      margin: 0 0 10px 0;
      font-size: 28px;
    }

    .help-box p {
      margin: 0;
      font-size: 22px;
      line-height: 1.4;
    }

    .footer {
      margin: 20px 0 40px 0;
      font-size: 18px;
      color: #777;
    }

    @media (max-width: 1100px) {
      .topbar {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .brand-text {
        text-align: center;
      }

      h1 {
        font-size: 52px;
      }

      h2.subtitle {
        font-size: 34px;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(220px, 1fr));
      }

      .help-box {
        position: static;
        margin: 0 auto 30px auto;
        max-width: 420px;
      }
    }

    @media (max-width: 700px) {
      .logo {
        width: 210px;
        max-width: 70vw;
      }

      .brand-text h2 {
        font-size: 34px;
      }

      .brand-text p {
        font-size: 24px;
      }

      h1 {
        font-size: 40px;
        padding: 0 12px;
      }

      h2.subtitle {
        font-size: 30px;
        padding: 0 12px;
      }

      .info {
        font-size: 22px;
        padding: 0 16px;
      }

      .grid {
        grid-template-columns: 1fr;
        padding: 0 20px;
        gap: 22px;
      }

      .button {
        min-height: 100px;
        font-size: 28px;
      }

      .help-box h3 {
        font-size: 24px;
      }

      .help-box p {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <img src="diki-logo.png" alt="DiKi logo" class="logo">

    <div class="brand-text">
      <h2>Digiin kiinni</h2>
      <p>Digilaitteiden kierrätyksellä</p>
    </div>
  </div>

  <h1>AsTi – Asiointitietokone</h1>
  <h2 class="subtitle">Peruspalvelut</h2>

  <div class="info">
    Valitse palvelu. Tarvittaessa pyydä apua.
  </div>

  <div class="grid">
    <a href="https://www.suomi.fi" class="button">Suomi.fi</a>
    <a href="https://www.kanta.fi/omakanta" class="button">Omakanta</a>
    <a href="https://www.vero.fi/omavero" class="button">OmaVero</a>
    <a href="https://www.op.fi" class="button">Pankki (OP)</a>
    <a href="https://mail.google.com" class="button">Sähköposti</a>
    <a href="https://www.omasavo.fi" class="button">OmaSavo</a>
  </div>

  <div class="help-box">
    <h3>Tarvitsetko apua?</h3>
    <p>DiKi ry:n tukipalvelu<br>tuki.diki2026@gmail.com</p>
  </div>

  <div class="footer">
    DiKi – Digilaitteiden kierrätyksellä digi-in
  </div>

</body>
</html>
